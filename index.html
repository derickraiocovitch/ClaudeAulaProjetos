<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bem-vindos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7c3aed;
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 999px;
      padding: 0.3rem 1rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.125rem;
      color: #94a3b8;
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      border-radius: 999px;
      margin: 2rem auto;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #475569;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Time de Desenvolvimento</div>
    <h1>Bem-vindos,<br>devs.</h1>
    <div class="divider"></div>
    <p>Este é o nosso espaço. Construído por pessoas que transformam ideias em código.</p>
    <div class="footer">Projeto Aula Claude &mdash; 2026</div>
  </div>
</body>
</html>
